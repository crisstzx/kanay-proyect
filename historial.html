<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Ventas - Sistema Kanay</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        h1 { color: #2ecc71; margin: 0; font-size: 24px; }
        .btn-refresh {
            background-color: #2ecc71;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-clear {
            background-color: #e74c3c;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }
        .pedido-card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .pedido-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed #444;
            padding-bottom: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .id-pedido { font-weight: bold; color: #2ecc71; }
        .total-pedido { font-size: 18px; font-weight: bold; color: #f1c40f; }
        .producto-line {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #ccc;
            margin-bottom: 4px;
        }
        .vacio {
            text-align: center;
            color: #888;
            margin-top: 5px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>📊 PANEL DE CONTROL KANAY</h1>
                <div style="color: #aaa; font-size: 13px; margin-top: 3px;">Historial de comandas enviadas a cocina</div>
            </div>
            <div>
                <button class="btn-refresh" onclick="cargarHistorial()">🔄 Actualizar</button>
                <button class="btn-clear" onclick="limpiarHistorial()">🗑️ Limpiar Todo</button>
            </div>
        </header>

        <div id="contenedor-pedidos">
            <p class="vacio">Cargando registros...</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://kanay-proyect.onrender.com/historial';

        async function cargarHistorial() {
            const contenedor = document.getElementById('contenedor-pedidos');
            
            try {
                const respuesta = await fetch(API_URL);
                const listaPedidos = await respuesta.json();
                
                contenedor.innerHTML = '';

                if (listaPedidos.length === 0) {
                    contenedor.innerHTML = '<p class="vacio">No hay pedidos registrados en este turno.</p>';
                    return;
                }

                // Mostrar los más nuevos arriba (revertimos el array)
                listaPedidos.reverse().forEach(pedido => {
                    let productosHTML = '';
                    pedido.productos.forEach(p => {
                        productosHTML += `
                            <div class="producto-line">
                                <span>• ${p.cantidad}x ${p.producto}</span>
                                <span>S/. ${p.total_item.toFixed(2)}</span>
                            </div>
                        `;
                    });

                    contenedor.innerHTML += `
                        <div class="pedido-card">
                            <div class="pedido-header">
                                <span class="id-pedido">${pedido.id_pedido}</span>
                                <span><b>Mesa:</b> ${pedido.mesa} | <b>Pago:</b> ${pedido.metodo_pago}</span>
                            </div>
                            <div style="margin-bottom: 10px; font-size: 15px;">
                                <b>Cliente:</b> ${pedido.cliente.toUpperCase()}
                            </div>
                            <div style="margin-top: 5px; margin-bottom: 12px;">
                                ${productosHTML}
                            </div>
                            <div style="display: flex; justify-content: flex-end; align-items: center; gap: 10px;">
                                <span style="font-size: 12px; color: #888;">Cobrado:</span>
                                <span class="total-pedido">S/. ${pedido.total.toFixed(2)}</span>
                            </div>
                        </div>
                    `;
                });

            } catch (error) {
                contenedor.innerHTML = '<p class="vacio" style="color: #e74c3c;">Error al conectar con el servidor de Render.</p>';
            }
        }

        async function limpiarHistorial() {
            if(!confirm("¿Estás seguro de que quieres borrar de forma permanente todo el historial de ventas?")) return;
            
            try {
                await fetch('https://kanay-proyect.onrender.com/historial/limpiar', { method: 'DELETE' });
                cargarHistorial();
            } catch (error) {
                alert("No se pudo limpiar el historial.");
            }
        }

        // Cargar datos automáticamente al abrir la pantalla
        window.onload = cargarHistorial;
    </script>
</body>
</html>
