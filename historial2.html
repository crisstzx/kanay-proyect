<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Ventas - Sistema Kanay</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --surface-color: #1f2833;
            --surface-card: #151a22;
            --primary-color: #45f3ff;
            --accent-color: #2ecc71;
            --accent-hover: #27ae60;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --text-color: #c5c6c7;
            --text-light: #ffffff;
            --border-color: #2f3e46;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            display: none; /* Oculto por defecto hasta autenticar */
        }

        /* --- PANTALLA DE LOGIN --- */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--surface-card);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .login-box h2 {
            color: var(--text-light);
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .login-box h2 span {
            color: var(--primary-color);
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #85929e;
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            background: #0f141c;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 15px;
        }

        .login-box input:focus {
            border-color: var(--primary-color);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: #34d1dd;
            box-shadow: 0 0 15px rgba(69, 243, 255, 0.4);
        }

        .login-error {
            color: var(--danger-color);
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        /* --- ESTILOS DEL PANEL PRINCIPAL --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(69,243,255,0.05) 0%, rgba(0,0,0,0) 100%);
            border-bottom: 1px solid var(--border-color);
            border-radius: 0 0 20px 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .header-title h1 {
            color: var(--text-light);
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-shadow: 0 0 10px rgba(69, 243, 255, 0.2);
        }

        .header-title h1 span {
            color: var(--accent-color);
        }

        .subtitle {
            color: #85929e;
            margin-top: 5px;
            font-size: 13px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-refresh {
            background-color: var(--accent-color);
            color: #000;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
        }

        .btn-refresh:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
        }

        .btn-clear {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        .btn-clear:hover {
            background-color: var(--danger-color);
            color: var(--text-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .pedido-card {
            background-color: var(--surface-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            transition: border-color 0.3s ease;
        }

        .pedido-card:hover {
            border-color: rgba(69, 243, 255, 0.25);
        }

        .pedido-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .id-pedido {
            font-weight: bold;
            color: var(--primary-color);
            letter-spacing: 0.5px;
            background: rgba(69, 243, 255, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .pedido-meta {
            color: #85929e;
        }

        .pedido-meta b {
            color: var(--text-light);
        }

        .cliente-badge {
            font-size: 16px;
            margin-bottom: 15px;
            color: var(--text-light);
        }

        .cliente-badge span {
            color: var(--accent-color);
            font-weight: 700;
        }

        .productos-box {
            background-color: #0f141c;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 15px;
            border: 1px solid rgba(47, 62, 70, 0.5);
        }

        .producto-line {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-color);
            padding: 6px 0;
            border-bottom: 1px solid rgba(47, 62, 70, 0.2);
        }

        .producto-line:last-child {
            border-bottom: none;
        }

        .producto-nombre {
            display: flex;
            gap: 8px;
        }

        .producto-cant {
            color: var(--primary-color);
            font-weight: bold;
        }

        .pedido-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
        }

        .total-label {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #85929e;
        }

        .total-pedido {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary-color);
            text-shadow: 0 0 8px rgba(69, 243, 255, 0.2);
        }

        .vacio {
            text-align: center;
            color: #556270;
            margin-top: 40px;
            font-style: italic;
            font-size: 16px;
            background: var(--surface-card);
            padding: 40px;
            border-radius: 14px;
            border: 1px dashed var(--border-color);
        }
    </style>
</head>
<body>

    <div class="login-overlay" id="login-view">
        <div class="login-box">
            <h2>KANAY <span>ADMIN</span></h2>
            <div class="input-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Ingresa tu usuario">
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn-login" onclick="validarAcceso()">Entrar al Panel</button>
            <div class="login-error" id="error-msg">Credenciales incorrectas. Inténtalo de nuevo.</div>
        </div>
    </div>

    <div class="container" id="admin-panel">
        <header>
            <div class="header-title">
                <h1>📊 PANEL DE CONTROL <span>KANAY</span></h1>
                <div class="subtitle">Historial de comandas enviadas a cocina en tiempo real</div>
            </div>
            <div class="header-actions">
                <button class="btn btn-refresh" onclick="cargarHistorial()">🔄 Actualizar</button>
                <button class="btn btn-clear" onclick="limpiarHistorial()">🗑️ Limpiar Todo</button>
            </div>
        </header>

        <div id="contenedor-pedidos">
            <p class="vacio">Cargando registros del servidor...</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://kanay-proyect.onrender.com/historial';

        // CONFIGURA AQUÍ TU USUARIO Y CONTRASEÑA
        const USER_ADMIN = "admin";
        const PASS_ADMIN = "Kanay2026"; // Cambia esto por la contraseña que quieras

        function validarAcceso() {
            const userIn = document.getElementById('username').value;
            const passIn = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            if (userIn === USER_ADMIN && passIn === PASS_ADMIN) {
                // Ocultar login y mostrar panel
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                
                // Ejecutar la carga de datos únicamente tras autenticar exitosamente
                cargarHistorial();
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('password').value = '';
            }
        }

        // Permitir iniciar sesión presionando la tecla Enter
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.getElementById('login-view').style.display !== 'none') {
                validarAcceso();
            }
        });

        async function cargarHistorial() {
            const contenedor = document.getElementById('contenedor-pedidos');
            
            try {
                const respuesta = await fetch(API_URL);
                const listaPedidos = await respuesta.json();
                
                contenedor.innerHTML = '';

                if (!listaPedidos || listaPedidos.length === 0) {
                    contenedor.innerHTML = '<p class="vacio">No hay pedidos registrados en este turno.</p>';
                    return;
                }

                listaPedidos.reverse().forEach(pedido => {
                    let productosHTML = '';
                    const items = pedido.platos || pedido.platos_ordenados || pedido.productos || [];
                    
                    items.forEach(p => {
                        const nombrePlato = p.plato || p.producto || "Plato Desconocido";
                        const totalItem = p.total_item !== undefined ? p.total_item : 0;
                        
                        productosHTML += `
                            <div class="producto-line">
                                <div class="producto-nombre">
                                    <span class="producto-cant">${p.cantidad}x</span>
                                    <span>${nombrePlato}</span>
                                </div>
                                <span>S/. ${totalItem.toFixed(2)}</span>
                            </div>
                        `;
                    });

                    let totalFinal = 0;
                    if (pedido.cuenta && pedido.cuenta.total_a_pagar !== undefined) {
                        totalFinal = pedido.cuenta.total_a_pagar;
                    } else if (pedido.total !== undefined) {
                        totalFinal = pedido.total;
                    }

                    const mesa = pedido.mesa || "N/A";
                    const metodoPago = pedido.metodo_pago || pedido.metodoPago || "No especificado";
                    const cliente = pedido.cliente || pedido.nombre || "Cliente";

                    contenedor.innerHTML += `
                        <div class="pedido-card">
                            <div class="pedido-header">
                                <span class="id-pedido">#${(pedido.id_pedido || "0000").toUpperCase()}</span>
                                <span class="pedido-meta"><b>Mesa:</b> ${mesa} | <b>Pago:</b> ${metodoPago}</span>
                            </div>
                            <div class="cliente-badge">
                                Cliente: <span>${cliente.toUpperCase()}</span>
                            </div>
                            <div class="productos-box">
                                ${productosHTML}
                            </div>
                            <div class="pedido-footer">
                                <span class="total-label">Total Cobrado:</span>
                                <span class="total-pedido">S/. ${totalFinal.toFixed(2)}</span>
                            </div>
                        </div>
                    `;
                });

            } catch (error) {
                console.error(error);
                contenedor.innerHTML = '<p class="vacio" style="color: var(--danger-color); border-color: var(--danger-color);">Error al conectar con el servidor de Render.</p>';
            }
        }

        async function limpiarHistorial() {
            if(!confirm("¿Estás seguro de que deseas borrar permanentemente todo el historial de ventas? Esta acción no se puede deshacer.")) return;
            
            try {
                const respuesta = await fetch('https://kanay-proyect.onrender.com/historial/limpiar', { method: 'DELETE' });
                if(respuesta.ok) {
                    cargarHistorial();
                } else {
                    alert("El servidor denegó la acción de limpieza.");
                }
            } catch (error) {
                alert("No se pudo conectar con el servidor para limpiar el historial.");
            }
        }
    </script>
</body>
</html>
